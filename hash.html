<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hashcode 工作台</title>
    <!-- Phosphor 图标库 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Noto Serif SC 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div id="an-toast" class="toast-notification">
        <i class="ph-fill ph-heart"></i>
        <span id="toast-msg">本地工作台已就绪。</span>
    </div>

    <!-- 左侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-item active" id="nav-chat" onclick="switchView('chat')">
            <i class="ph-light ph-chat-teardrop-text main-icon"></i> 会话
        </div>
        <div class="sidebar-item" onclick="showToast('搜索入口还没接线，先直接在会话里描述需求会更快。')">
            <i class="ph-light ph-magnifying-glass main-icon"></i> 搜索
        </div>
        <div class="sidebar-item" onclick="showToast('插件能力还在准备中，当前先走本地工具链。')">
            <i class="ph-light ph-plug main-icon"></i> 插件
        </div>
        <div class="sidebar-item" onclick="showToast('自动化入口后面再补，现在先把主链路跑通。')">
            <i class="ph-light ph-robot main-icon"></i> 自动化
        </div>

        <!-- 动态侧边栏区域：项目与对话的切换 -->
        <div class="section-header" onclick="toggleSidebarMode()">
            <div class="section-title-text" id="sidebar-title-text">
                我的项目 <i class="ph-light ph-caret-down" style="font-size: 10px;"></i>
            </div>
            <div class="section-add-btn" onclick="event.stopPropagation(); addSidebarItem();">
                <i class="ph-light ph-plus" style="font-size: 14px;"></i>
            </div>
        </div>

        <div class="sidebar-dynamic-list" id="sidebar-list">
            <!-- 由 JavaScript 动态渲染内容 -->
        </div>

        <div class="sidebar-item" id="nav-settings" onclick="switchView('settings')" style="margin-top: 10px;">
            <i class="ph-light ph-gear main-icon"></i> 设置
        </div>
    </aside>

    <!-- 右侧动态视图区 -->
    <main class="view-container">

        <div id="view-chat" class="view-panel active">
            <header class="header">
                <div class="header-title" id="chat-header-title">hashcode 工作台</div>
                <div class="header-actions">
                    <i class="ph-light ph-sidebar-simple" onclick="toggleSidebar()" title="折叠/展开侧边栏"></i>
                    <i class="ph-light ph-folder-plus" onclick="showToast('这个入口我先没动，当前还是直接在会话里描述需求。')"></i>
                    <i class="ph-light ph-dots-three"></i>
                </div>
            </header>

            <div class="chat-container" id="chat-container">
                <h1 class="welcome-text" id="welcome-text-h1">What Should We Work In hashcode?</h1>

                <div class="message-list" id="message-list"></div>

                <div class="input-wrapper">
                    <textarea class="chat-input" id="chat-input" placeholder="直接描述你要处理的事，Enter 发送，Shift + Enter 换行。" rows="1" onkeydown="handleEnter(event)"></textarea>

                    <div class="input-toolbar">
                        <div class="toolbar-left">
                            <button class="tool-btn-circle" onclick="showToast('直接新建一轮对话，或者从左边切已有对话就行。')"><i class="ph-light ph-plus"></i></button>

                            <!-- 权限模式下拉菜单 -->
                            <div class="dropdown-container">
                                <button class="tool-btn-capsule" id="btn-permission" onclick="toggleDropdown('menu-permission', event)">
                                    <i class="ph-light ph-shield-check"></i> <span>完全访问权限</span> <i class="ph-light ph-caret-down"></i>
                                </button>
                                <div class="dropdown-menu" id="menu-permission">
                                    <div class="dropdown-item" onclick="selectOption('btn-permission', 'menu-permission', '默认权限', 'ph-hand-palm', this, event)">
                                        <div class="dropdown-item-left"><i class="ph-light ph-hand-palm menu-icon"></i> 默认权限</div>
                                        <i class="ph-light ph-check check-icon"></i>
                                    </div>
                                    <div class="dropdown-item selected" onclick="selectOption('btn-permission', 'menu-permission', '完全访问权限', 'ph-shield-check', this, event)">
                                        <div class="dropdown-item-left"><i class="ph-light ph-shield-check menu-icon"></i> 完全访问权限</div>
                                        <i class="ph-light ph-check check-icon"></i>
                                    </div>
                                    <div class="dropdown-item" onclick="selectOption('btn-permission', 'menu-permission', '自定义 (config.toml)', 'ph-gear', this, event)">
                                        <div class="dropdown-item-left"><i class="ph-light ph-gear menu-icon"></i> 自定义 (config.toml)</div>
                                        <i class="ph-light ph-check check-icon"></i>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="toolbar-right">
                            <!-- 模型选择下拉菜单 -->
                            <div class="dropdown-container">
                                <button class="tool-btn-capsule" id="btn-model" onclick="toggleDropdown('menu-model', event)">
                                    <span>gpt-5.4</span> <i class="ph-light ph-caret-down"></i>
                                </button>
                                <div class="dropdown-menu right-align" id="menu-model">
                                    <!-- 由 JS 动态渲染 -->
                                </div>
                            </div>

                            <!-- 推理强度下拉菜单 -->
                            <div class="dropdown-container">
                                <button class="tool-btn-capsule" id="btn-intensity" onclick="toggleDropdown('menu-intensity', event)">
                                    <span>中</span> <i class="ph-light ph-caret-down"></i>
                                </button>
                                <div class="dropdown-menu right-align" id="menu-intensity">
                                    <!-- 由 JS 动态渲染 -->
                                </div>
                            </div>

                            <button class="tool-btn-circle" onclick="animateSend()"><i class="ph-light ph-arrow-up"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 设置视图 -->
        <div id="view-settings" class="view-panel">
            <header class="header">
                <div class="header-title">设置</div>
                <div class="header-actions">
                    <i class="ph-light ph-x" onclick="switchView('chat')"></i>
                </div>
            </header>
            <div class="settings-container">
                <div class="settings-section">
                    <div class="settings-item">
                        <div class="settings-info">
                            <span class="settings-title">主题颜色偏好</span>
                            <span class="settings-desc">选择当前工作台的强调色。</span>
                        </div>
                        <select class="select-box" onchange="changeTheme(this.value)">
                            <option value="#ffffff">纸墨白</option>
                            <option value="#cba6f7">鸢尾紫</option>
                            <option value="#89b4fa">冷静蓝</option>
                            <option value="#a6e3a1">轻量绿</option>
                        </select>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-item">
                        <div class="settings-info">
                            <span class="settings-title">本地后端连接提示</span>
                            <span class="settings-desc">这里只控制页面侧的提示状态，真正的模型连接由本地 Python 服务提供。</span>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" checked onclick="showToast(this.checked ? '已开启本地服务提示。' : '已关闭本地服务提示。')">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-item">
                        <div class="settings-info"><span class="settings-title" style="color: #f38ba8;">清空当前会话</span></div>
                        <button class="tool-btn-danger" onclick="clearCurrentSessionFromSettings()">清空</button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- JS 模块 -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/state.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
